<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Phoenix Config</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        padding: 40px;
        background: #f4f4f4;
        color: #333;
      }
      .box {
        background: white;
        padding: 25px;
        border-radius: 8px;
        max-width: 500px;
        margin: 0 auto 20px auto;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border-top: 4px solid #003366;
      }
      h3 {
        margin-top: 0;
        color: #003366;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
      }
      textarea,
      input[type="file"] {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        margin-top: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        border-radius: 4px;
        font-size: 1em;
      }
      .btn-blue {
        background: #003366;
      }
      .btn-blue:hover {
        background: #002244;
      }
      .btn-green {
        background: #28a745;
      }
      .btn-green:hover {
        background: #218838;
      }
      .help-text {
        font-size: 0.85em;
        color: #666;
        margin-bottom: 10px;
      }
      #status {
        text-align: center;
        font-weight: bold;
        margin-top: 20px;
        font-size: 1.1em;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h3>1. Gestionar Marketing Reps</h3>
      <p class="help-text">
        Escribe los nombres separados por comas. (Ej: John Doe, Mary Jane, Peter
        Parker)
      </p>
      <textarea
        id="repsInput"
        rows="4"
        placeholder="Cargando reps..."
      ></textarea>
      <button class="btn-blue" onclick="saveReps()">GUARDAR REPS</button>
    </div>

    <div class="box">
      <h3>2. Actualizar Locaciones (JSON)</h3>
      <p class="help-text">
        Sube el archivo campaigns.json para actualizar los menús desplegables.
      </p>
      <input type="file" id="fileInput" accept=".json" />
      <button class="btn-green" onclick="uploadJSON()">
        SUBIR JSON A LA NUBE
      </button>
    </div>

    <p id="status"></p>

    <script src="config.js"></script>
    <script>
      // Cargar Reps actuales al entrar
      window.onload = async () => {
        try {
          const res = await fetch(APP_CONFIG.API_URL);
          const data = await res.json();
          if (data.reps && data.reps.length > 0) {
            document.getElementById("repsInput").value = data.reps.join(", ");
          } else {
            document.getElementById("repsInput").placeholder =
              "No hay reps configurados. Escribe los nombres aquí.";
          }
        } catch (error) {
          console.error("Error conectando a la API:", error);
          document.getElementById("status").innerText =
            "❌ Error al cargar datos. Verifica la URL en config.js";
          document.getElementById("status").style.color = "red";
        }
      };

      async function saveReps() {
        const rawText = document.getElementById("repsInput").value;
        const repsArray = rawText
          .split(",")
          .map((r) => r.trim())
          .filter((r) => r !== "");

        const statusEl = document.getElementById("status");
        statusEl.innerText = "Guardando reps...";
        statusEl.style.color = "#333";

        await fetch(APP_CONFIG.API_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify({ action: "saveConfig", reps: repsArray }),
        });

        statusEl.innerText = "✅ Reps actualizados con éxito.";
        statusEl.style.color = "green";
      }

      function uploadJSON() {
        const file = document.getElementById("fileInput").files[0];
        const statusEl = document.getElementById("status");

        if (!file) {
          statusEl.innerText = "⚠️ Selecciona un archivo JSON primero.";
          statusEl.style.color = "orange";
          return;
        }

        const reader = new FileReader();
        reader.onload = async (e) => {
          const campaigns = JSON.parse(e.target.result).campaigns;
          statusEl.innerText = "Subiendo campañas...";
          statusEl.style.color = "#333";

          await fetch(APP_CONFIG.API_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
              action: "saveConfig",
              campaigns: campaigns,
            }),
          });

          statusEl.innerText = "✅ Campañas actualizadas con éxito.";
          statusEl.style.color = "green";
          document.getElementById("fileInput").value = ""; // Limpiar input
        };
        reader.readAsText(file);
      }
    </script>
  </body>
</html>
