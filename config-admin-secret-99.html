<!doctype html>
<html>
  <head>
    <title>Admin - Phoenix</title>
  </head>
  <body style="font-family: sans-serif; padding: 40px; background: #f4f4f4">
    <div
      style="
        background: white;
        padding: 20px;
        border-radius: 8px;
        max-width: 400px;
        margin: auto;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      "
    >
      <h3>Actualizar Locaciones</h3>
      <input
        type="file"
        id="fileInput"
        accept=".json"
        style="margin-bottom: 20px"
      />
      <button
        id="uploadBtn"
        style="
          width: 100%;
          padding: 10px;
          background: #d9534f;
          color: white;
          border: none;
          cursor: pointer;
        "
      >
        SUBIR A LA NUBE
      </button>
      <p id="status"></p>
    </div>

    <script>
      const API_URL =
        "https://script.google.com/macros/s/AKfycbxdOtZ9XGWwjFwhUWLeAXFXRUHiWpFzQ1ycAlsgyr4tsqma9XpFYfmp2yset6Wad9rFgw/exec";
      document.getElementById("uploadBtn").onclick = function () {
        const file = document.getElementById("fileInput").files[0];
        const reader = new FileReader();
        reader.onload = function (e) {
          const campaigns = JSON.parse(e.target.result).campaigns;
          fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
              action: "saveConfig",
              campaigns: campaigns,
            }),
          }).then(() => {
            document.getElementById("status").innerText =
              "✅ Sincronizado con éxito para todos los agentes.";
          });
        };
        reader.readAsText(file);
      };
    </script>
  </body>
</html>
