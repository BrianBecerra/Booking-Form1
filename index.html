<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Phoenix Client Booking Form</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background-color: #dee2e6;
        padding: 20px;
        color: #333;
      }
      .container {
        max-width: 800px;
        margin: auto;
        background: #f8f9fa;
        padding: 25px;
        border-radius: 4px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        border-top: 5px solid #003366;
      }
      h2 {
        color: #003366;
        font-size: 1.5em;
        border-bottom: 1px solid #ddd;
        padding-bottom: 10px;
        margin-top: 0;
      }
      .section {
        background: #e9ecef;
        margin-bottom: 20px;
        padding: 15px;
        border-radius: 4px;
        border-left: 4px solid #adb5bd;
      }
      .section-title {
        font-weight: bold;
        color: #495057;
        font-size: 0.85em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-size: 0.85em;
        font-weight: 600;
        color: #444;
      }
      select,
      input,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 0.9em;
      }
      .full-width {
        grid-column: span 2;
      }
      .btn-submit {
        width: 100%;
        padding: 12px;
        background: #2b5797;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
        font-size: 1em;
        margin-top: 10px;
      }
      .btn-submit:hover {
        background: #1e3d6b;
      }
      .btn-submit:disabled {
        background: #888;
        cursor: not-allowed;
      }

      /* Clases para lógica condicional */
      .hidden {
        display: none !important;
      }
      .type-selector {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
        padding: 15px;
        background: #e3f2fd;
        border: 1px solid #bbdefb;
        border-radius: 4px;
        font-weight: bold;
        color: #0d47a1;
      }
      .type-selector label {
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 1em;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Phoenix Client Booking Form</h2>

      <div class="type-selector">
        <label
          ><input
            type="radio"
            name="bookingType"
            value="Regular"
            checked
            onchange="toggleForm()"
          />
          Regular Booking</label
        >
        <label
          ><input
            type="radio"
            name="bookingType"
            value="Transferred"
            onchange="toggleForm()"
          />
          Transferred</label
        >
      </div>

      <form id="bookingForm">
        <div class="section">
          <div class="section-title">General Information</div>
          <div class="grid">
            <div>
              <label>Agent Name / Rep</label>
              <select id="rep" required>
                <option value="">Select Rep</option>
              </select>
            </div>
            <div>
              <label>First Name</label
              ><input type="text" id="firstName" required />
            </div>
            <div>
              <label>Last Name</label
              ><input type="text" id="lastName" required />
            </div>
            <div>
              <label>Phone</label><input type="tel" id="phone" required />
            </div>
          </div>
        </div>

        <div id="regularFields" class="section">
          <div class="section-title">Regular Booking Details</div>
          <div class="grid">
            <div>
              <label>Group</label>
              <select id="group" class="req-regular">
                <option value="">Select Group</option>
              </select>
            </div>
            <div>
              <label>Source</label>
              <select id="source" class="req-regular">
                <option>Outbound</option>
                <option>Inbound</option>
              </select>
            </div>
            <div class="full-width">
              <label>Venue</label>
              <select id="venue" class="req-regular">
                <option value="">Select Venue</option>
              </select>
            </div>
            <div class="full-width">
              <label>Address</label>
              <input
                type="text"
                id="address"
                readonly
                style="background: #e9ecef"
              />
            </div>
            <div>
              <label>Day</label
              ><select id="day" class="req-regular">
                <option value="">Select Day</option>
              </select>
            </div>
            <div>
              <label>Time</label
              ><select id="time" class="req-regular">
                <option value="">Select Time</option>
              </select>
            </div>
            <div>
              <label>Spouse's Name</label><input type="text" id="spouseName" />
            </div>
            <div>
              <label>Email Address</label><input type="email" id="email" />
            </div>
          </div>
        </div>

        <div id="transferFields" class="section hidden">
          <div class="section-title">Transfer Details</div>
          <div class="grid">
            <div>
              <label>Payout</label>
              <select id="payout" class="req-transfer">
                <option value="">Select</option>
                <option value="$0">$0</option>
                <option value="$50">$50</option>
                <option value="$100">$100</option>
              </select>
            </div>
            <div>
              <label>Maintenance Fees</label>
              <select id="maintFees" class="req-transfer">
                <option value="">Select</option>
                <option value="Over 1 K">Over 1 K</option>
                <option value="Under 1 K">Under 1 K</option>
              </select>
            </div>
            <div>
              <label>Contract Type</label>
              <select id="contractType" class="req-transfer">
                <option value="">Select</option>
                <option value="Paid in full">Paid in full</option>
                <option value="Financed">Financed</option>
              </select>
            </div>
            <div>
              <label>Status</label>
              <select id="status" class="req-transfer">
                <option value="">Select</option>
                <option value="Transferred">Transferred</option>
                <option value="Pending">Pending</option>
              </select>
            </div>
            <div>
              <label>Qualified</label>
              <select id="qualified" class="req-transfer">
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>
          </div>
        </div>

        <div class="section">
          <label>Notes</label>
          <textarea id="notes" rows="3"></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit to Sheets</button>
      </form>
    </div>

    <script src="config.js"></script>
    <script>
      let campaignData = [];

      window.onload = async () => {
        try {
          const res = await fetch(APP_CONFIG.API_URL);
          const data = await res.json();

          // Poblar Reps
          const repSelect = document.getElementById("rep");
          if (data.reps) {
            data.reps.forEach(
              (r) =>
                (repSelect.innerHTML += `<option value="${r}">${r}</option>`),
            );
          }

          // Poblar Grupos (Campañas)
          campaignData = data.campaigns || [];
          const groupSelect = document.getElementById("group");
          campaignData.forEach(
            (c) =>
              (groupSelect.innerHTML += `<option value="${c.name}">${c.name}</option>`),
          );

          toggleForm(); // Inicializar estado de validaciones
        } catch (error) {
          console.error("Error cargando configuración:", error);
          alert("No se pudieron cargar los datos. Verifica la conexión.");
        }
      };

      // --- LÓGICA DE CONDICIONALES ---
      function toggleForm() {
        const isTransfer =
          document.querySelector('input[name="bookingType"]:checked').value ===
          "Transferred";
        const regFields = document.getElementById("regularFields");
        const transFields = document.getElementById("transferFields");

        if (isTransfer) {
          regFields.classList.add("hidden");
          transFields.classList.remove("hidden");

          document
            .querySelectorAll(".req-regular")
            .forEach((el) => el.removeAttribute("required"));
          document
            .querySelectorAll(".req-transfer")
            .forEach((el) => el.setAttribute("required", "true"));
        } else {
          regFields.classList.remove("hidden");
          transFields.classList.add("hidden");

          document
            .querySelectorAll(".req-regular")
            .forEach((el) => el.setAttribute("required", "true"));
          document
            .querySelectorAll(".req-transfer")
            .forEach((el) => el.removeAttribute("required"));
        }
      }

      // --- LÓGICA CASCADING DROPDOWNS ---
      document.getElementById("group").onchange = function () {
        const campaign = campaignData.find((c) => c.name === this.value);
        const venueSelect = document.getElementById("venue");
        venueSelect.innerHTML = '<option value="">Select Venue</option>';
        if (campaign) {
          campaign.venues.forEach(
            (v) =>
              (venueSelect.innerHTML += `<option value="${v.name}">${v.name}</option>`),
          );
        }
      };

      document.getElementById("venue").onchange = function () {
        const campaign = campaignData.find(
          (c) => c.name === document.getElementById("group").value,
        );
        const venue = campaign.venues.find((v) => v.name === this.value);
        const daySelect = document.getElementById("day");
        daySelect.innerHTML = '<option value="">Select Day</option>';
        if (venue) {
          document.getElementById("address").value = venue.address;
          venue.schedules.forEach(
            (s) =>
              (daySelect.innerHTML += `<option value="${s.date}">${s.date}</option>`),
          );
        } else {
          document.getElementById("address").value = "";
        }
      };

      document.getElementById("day").onchange = function () {
        const campaign = campaignData.find(
          (c) => c.name === document.getElementById("group").value,
        );
        const venue = campaign.venues.find(
          (v) => v.name === document.getElementById("venue").value,
        );
        const schedule = venue.schedules.find((s) => s.date === this.value);
        const timeSelect = document.getElementById("time");
        timeSelect.innerHTML = '<option value="">Select Time</option>';
        if (schedule) {
          schedule.times.forEach(
            (t) =>
              (timeSelect.innerHTML += `<option value="${t}">${t}</option>`),
          );
        }
      };

      // --- ENVÍO DE DATOS ---
      document.getElementById("bookingForm").onsubmit = async function (e) {
        e.preventDefault();
        const btn = document.querySelector(".btn-submit");
        btn.innerText = "Sending...";
        btn.disabled = true;

        const isTransfer =
          document.querySelector('input[name="bookingType"]:checked').value ===
          "Transferred";

        const formData = {
          action: "submitAppointment",
          bookingType: document.querySelector(
            'input[name="bookingType"]:checked',
          ).value,
          rep: document.getElementById("rep").value,
          firstName: document.getElementById("firstName").value,
          lastName: document.getElementById("lastName").value,
          phone: document.getElementById("phone").value,
          notes: document.getElementById("notes").value,
        };

        if (isTransfer) {
          formData.payout = document.getElementById("payout").value;
          formData.maintFees = document.getElementById("maintFees").value;
          formData.contractType = document.getElementById("contractType").value;
          formData.status = document.getElementById("status").value;
          formData.qualified = document.getElementById("qualified").value;
        } else {
          formData.group = document.getElementById("group").value;
          formData.source = document.getElementById("source").value;
          formData.venue = document.getElementById("venue").value;
          formData.address = document.getElementById("address").value;
          formData.day = document.getElementById("day").value;
          formData.time = document.getElementById("time").value;
          formData.spouseName = document.getElementById("spouseName").value;
          formData.email = document.getElementById("email").value;
        }

        try {
          await fetch(APP_CONFIG.API_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(formData),
          });
          alert("Record Saved Successfully!");
          location.reload();
        } catch (error) {
          console.error("Error al enviar el formulario:", error);
          alert("Hubo un error al guardar la cita.");
          btn.innerText = "Submit to Sheets";
          btn.disabled = false;
        }
      };
    </script>
  </body>
</html>
